functionsDirectory = "/home/user/workspace/qwirkle-online/netlify/functions"
functionsDirectoryOrigin = "config"
headersOrigin = "config"
redirectsOrigin = "config"
plugins = []

[build]
publish = "/home/user/workspace/qwirkle-online/dist"
publishOrigin = "config"
commandOrigin = "config"
command = "npm run build"
functions = "/home/user/workspace/qwirkle-online/netlify/functions"

[build.environment]
NODE_VERSION = "20"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[functions]

[functions."*"]

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/sw.js"

[headers.values]
Cache-Control = "no-cache"

[[headers]]
for = "/manifest.json"

[headers.values]
Content-Type = "application/manifest+json"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]